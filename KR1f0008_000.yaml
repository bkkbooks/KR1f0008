body:
  text: 孝經定本孝經類提要臣等謹案孝經定本一卷元吳澄撰澄有易纂言己著録此書以今文孝經為本仍從朱子刋誤之例分列經傳其經則合今文六章為一章其傳則依今文為十二章而改易其次序朱子所刪一百七十二字案朱子刋誤凡刪二百二十三字中有句刪其字者此惟載所刪之句故止一百七十二字與古文閨門章二十四字並附錄於後後有大徳癸卯澄門人河南張恒跋稱澄觀邢疏而知古文之偽觀朱子所論知今文亦有可疑因整齊諸説附入已見為家塾課子之書不欲傳之未嘗示人云云葢心亦有所不安也其謂漢初諸儒始見此書葢未考吕氏春秋已引孝經之語至其據許氏説文所引古文孝經仲尼居無閒字知古文之仲尼閒居為劉炫所妄増人據桓譚新論稱古文千八百七十二字與今文異者四百餘字今劉炫本止有千八百七字多於今文八字除増閨門一章二十四字外與今文異字僅二十餘字則較司馬貞之攻古文但泛稱文句鄙俗者持有根據所定篇第雖多分裂舊文而詮解簡明亦秩然成理朱子刋誤既不可廢則澄此書亦不能不存葢至是而孝經有二改本矣乾隆四十六年十二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:ae766d2ee4daa97ddd9cc33d9cd5369f74f5005e5d4861ca89c63befaeb5cdb0
